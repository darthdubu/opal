<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Opal iridescent gradient - shifting colors -->
    <linearGradient id="opalBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5ff;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#c5b3ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffb8e0;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#b8ffd1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d5ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Inner glow for depth -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="60%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    
    <!-- Facet gradients for 3D gem effect -->
    <linearGradient id="facet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#a8d5ff;stop-opacity:0.6" />
    </linearGradient>
    
    <linearGradient id="facet2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c5ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c5b3ff;stop-opacity:0.5" />
    </linearGradient>
    
    <linearGradient id="facet3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd4e8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffb8e0;stop-opacity:0.5" />
    </linearGradient>
    
    <linearGradient id="facet4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8ffe0;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#b8ffd1;stop-opacity:0.4" />
    </linearGradient>
    
    <!-- Drop shadow -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="30" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glass highlight -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Icon background with macOS Big Sur style rounded rect -->
  <rect x="50" y="50" width="924" height="924" rx="224" ry="224" fill="url(#opalBase)" filter="url(#dropShadow)"/>
  
  <!-- Inner shadow/depth ring -->
  <rect x="80" y="80" width="864" height="864" rx="194" ry="194" fill="none" stroke="#000000" stroke-width="2" opacity="0.1"/>
  
  <!-- Main gem facets - creating opal's characteristic play-of-color -->
  <!-- Top-left facet -->
  <polygon points="150,280 280,150 512,250 250,512" fill="url(#facet1)" opacity="0.8"/>
  
  <!-- Top-right facet -->
  <polygon points="744,150 874,280 774,512 512,250" fill="url(#facet2)" opacity="0.8"/>
  
  <!-- Bottom-left facet -->
  <polygon points="150,744 250,512 512,774 280,874" fill="url(#facet4)" opacity="0.8"/>
  
  <!-- Bottom-right facet -->
  <polygon points="774,512 874,744 744,874 512,774" fill="url(#facet3)" opacity="0.8"/>
  
  <!-- Center facet -->
  <polygon points="250,512 512,250 774,512 512,774" fill="#ffffff" opacity="0.3"/>
  
  <!-- Terminal cursor element - subtle prompt symbol -->
  <g transform="translate(420, 420)" opacity="0.9">
    <!-- Greater than symbol -->
    <path d="M 40 60 L 100 100 L 40 140" fill="none" stroke="#1a1a2e" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Underscore cursor -->
    <rect x="40" y="160" width="80" height="24" rx="4" fill="#1a1a2e"/>
  </g>
  
  <!-- Inner glow for depth -->
  <rect x="150" y="150" width="724" height="724" rx="150" ry="150" fill="url(#innerGlow)"/>
  
  <!-- Top glass highlight -->
  <path d="M 150 280 Q 512 150 874 280 Q 800 200 512 180 Q 224 200 150 280" fill="url(#glassHighlight)" opacity="0.7"/>
  
  <!-- Subtle sparkle effects -->
  <circle cx="280" cy="280" r="8" fill="#ffffff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="744" cy="380" r="6" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="380" cy="700" r="5" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Color play overlay - subtle shifting colors -->
  <rect x="150" y="150" width="724" height="724" rx="150" ry="150" fill="url(#opalBase)" opacity="0.15" style="mix-blend-mode: overlay;"/>
</svg>