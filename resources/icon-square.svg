<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    
    <linearGradient id="opal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="33%" stop-color="#7b68ee"/>
      <stop offset="66%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="64" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="32" y="32" width="448" height="448" rx="64" fill="url(#glass)"/>
  
  <!-- Title bar -->
  <path d="M48 96 L48 80 Q48 32 96 32 L416 32 Q464 32 464 80 L464 96 Z" fill="#2a2a4a" opacity="0.9"/>
  
  <!-- Traffic lights -->
  <circle cx="80" cy="64" r="12" fill="#ff5f56"/>
  <circle cx="112" cy="64" r="12" fill="#ffbd2e"/>
  <circle cx="144" cy="64" r="12" fill="#27ca40"/>
  
  <!-- Terminal - The Opal O -->
  <g filter="url(#glow)">
    <circle cx="256" cy="280" r="72" fill="none" stroke="url(#opal)" stroke-width="16"/>
  </g>
  
  <!-- Cursor -->
  <rect x="290" y="250" width="10" height="36" rx="2" fill="#00d4ff"/>
  
  <!-- Terminal lines -->
  <rect x="128" y="200" width="100" height="8" rx="2" fill="#7b68ee" opacity="0.7"/>
  <rect x="128" y="220" width="160" height="8" rx="2" fill="#ffa500" opacity="0.7"/>
  <rect x="128" y="240" width="80" height="8" rx="2" fill="#00ff88" opacity="0.7"/>
</svg>
